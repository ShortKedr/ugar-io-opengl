name: Build Desktop Binaries

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake
        run: cmake -S . -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release

      - name: Build executable
        run: cmake --build build --config Release --target ugar-io-opengl

      - name: Upload Windows package
        uses: actions/upload-artifact@v6
        with:
          name: ugar-io-opengl-windows
          path: build/ugar-io-opengl.exe
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Linux build dependencies
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libwayland-dev libwayland-bin libxkbcommon-dev wayland-protocols pkg-config

      - name: Configure CMake
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build executable
        run: cmake --build build --config Release --target ugar-io-opengl

      - name: Package Linux build
        run: tar -C build -czf build/ugar-io-opengl-linux.tar.gz ugar-io-opengl

      - name: Upload Linux package
        uses: actions/upload-artifact@v6
        with:
          name: ugar-io-opengl-linux
          path: build/ugar-io-opengl-linux.tar.gz
          if-no-files-found: error

  build-macos-arm64:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure CMake
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build executable
        run: cmake --build build --config Release --target ugar-io-opengl

      - name: Package macOS arm64 build
        run: tar -C build -czf build/ugar-io-opengl-macos-arm64.tar.gz ugar-io-opengl

      - name: Upload macOS arm64 package
        uses: actions/upload-artifact@v6
        with:
          name: ugar-io-opengl-macos-arm64
          path: build/ugar-io-opengl-macos-arm64.tar.gz
          if-no-files-found: error

  build-macos-x86_64:
    runs-on: macos-15-intel

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure CMake
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build executable
        run: cmake --build build --config Release --target ugar-io-opengl

      - name: Package macOS x86_64 build
        run: tar -C build -czf build/ugar-io-opengl-macos-x86_64.tar.gz ugar-io-opengl

      - name: Upload macOS x86_64 package
        uses: actions/upload-artifact@v6
        with:
          name: ugar-io-opengl-macos-x86_64
          path: build/ugar-io-opengl-macos-x86_64.tar.gz
          if-no-files-found: error

  create-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-windows
      - build-linux
      - build-macos-arm64
      - build-macos-x86_64
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/ugar-io-opengl.exe
            release-assets/ugar-io-opengl-linux.tar.gz
            release-assets/ugar-io-opengl-macos-arm64.tar.gz
            release-assets/ugar-io-opengl-macos-x86_64.tar.gz
          generate_release_notes: true
